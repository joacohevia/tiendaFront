<div class="modal-backdrop" *ngIf="visible" (click)="onClose()"></div>

<div class="modal d-block" tabindex="-1" *ngIf="visible">
  <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Editar Producto' : 'Nuevo Producto' }}</h5>
        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="nombre" name="nombre" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" [(ngModel)]="descripcion" name="descripcion" rows="3"></textarea>
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label">Precio</label>
              <input type="number" class="form-control" [(ngModel)]="precio_base" name="precio_base" required min="0">
            </div>
            <div class="col-6">
              <label class="form-label">Marca</label>
              <input type="text" class="form-control" [(ngModel)]="marca" name="marca" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">URL Imagen</label>
            <input type="text" class="form-control" [(ngModel)]="img" name="img">
          </div>

          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label">Categoría</label>
              <select class="form-select" [(ngModel)]="id_categoria" name="id_categoria" required>
                <option value="" disabled>Seleccionar categoría</option>
                <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nombre }}</option>
              </select>
            </div>
            <div class="col-6 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" [(ngModel)]="activo" name="activo" id="activoCheck">
                <label class="form-check-label" for="activoCheck">Activo</label>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="onClose()">Cancelar</button>
          <button type="submit" class="btn btn-primary">{{ isEdit ? 'Guardar' : 'Crear' }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
